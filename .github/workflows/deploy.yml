name: CrowdMind AI CI/CD Pipeline

on:
  push:
    branches:
      - main  # Jab bhi main branch par push hoga, pipeline trigger hogi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crowdmind-app:latest

  deploy-to-aws:
    runs-on: ubuntu-latest
    needs: build-and-push # Pehle image banegi, tabhi deploy hoga
    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            # Server ke andar naya code pull aur run karne ki script
            sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            
            # Agar purana container chal raha hai toh use stop aur remove karna
            sudo docker-compose down || true
            
            # Nayi image pull karna
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/crowdmind-app:latest
            
            # Docker compose se naya container start karna
            sudo docker-compose up -d
