name: CrowdMind AI CI/CD Pipeline

on:
  push:
    branches:
      - main  # Jab bhi main branch par push hoga, pipeline trigger hogi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crowdmind-app:latest

  deploy-to-aws:
    runs-on: ubuntu-latest
    needs: build-and-push # Pehle image banegi, tabhi deploy hoga
    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            # 1. System ko update karo aur Docker install karo
            sudo apt-get update -y
            sudo apt-get install -y docker.io docker-compose
            
            # 2. Current user ko docker group mein daalo taaki bina sudo ke bhi chal sake
            sudo usermod -aG docker ubuntu
            
            # 3. Ab aapki asli commands kaam karne lagengi
            sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/crowdmind-app:latest
            
            # Agar single container hai toh aise run karo (bina compose ke):
            sudo docker stop crowdmind-container || true
            sudo docker rm crowdmind-container || true
            sudo docker run -d --name crowdmind-container -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/crowdmind-app:latest
